# Starship Configuration with Gruvbox Dark Hard Theme
# Two-line prompt with useful information, cleanly organized

# Format: First line has all the context, second line is clean for typing
format = """
$username\
$hostname\
$directory\
$git_branch\
$python\
$nodejs\
$rust\
$golang\
$docker_context\
$package\
$fill\
$cmd_duration\
$time\
$line_break\
$jobs\
$status\
$character"""

# Prompt character - clean and simple
[character]
success_symbol = '[❯](bold fg:#8ec07c)'   # Cyan prompt for success
error_symbol = '[❯](bold fg:#fb4934)'     # Red prompt for errors
vimcmd_symbol = '[❮](bold fg:#8ec07c)'    # Reverse for vim mode

# Current directory - our primary cyan accent
[directory]
style = "bold fg:#8ec07c"
format = "[$path]($style)"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"
read_only = " 🔒"

[directory.substitutions]
"~" = "~"
"Documents" = " docs"
"Downloads" = " dl"
"Music" = " music"
"Pictures" = " pics"
"Projects" = " proj"
"Desktop" = " desk"
".config" = " cfg"

# Git branch - green for healthy repos
[git_branch]
symbol = " "
style = "fg:#b8bb26"
format = " [$symbol$branch]($style)"

# Git status - disabled for a cleaner prompt
# Uncomment below to re-enable git status indicators
# [git_status]
# style = "fg:#fabd2f"
# format = '([$all_status$ahead_behind]($style))'
# disabled = true

# Git state (during rebase, merge, etc.)
[git_state]
format = ' \([$state( $progress_current/$progress_total)]($style)\)'
style = "fg:#fb4934"
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"

# Username (only when root or SSH)
[username]
style_user = "fg:#ebdbb2"
style_root = "bold fg:#fb4934"
format = "[$user]($style)"
disabled = false
show_always = false

# Hostname (only over SSH)
[hostname]
ssh_only = true
ssh_symbol = " 🌐"
format = "[@$ssh_symbol$hostname]($style)"
style = "fg:#fabd2f"

# Python virtualenv
[python]
symbol = " "
style = "fg:#83a598"
format = ' [$symbol${pyenv_prefix}(${version})( \($virtualenv\))]($style)'
python_binary = ["python3", "python"]
detect_extensions = ["py"]
detect_files = ["requirements.txt", "setup.py", "pyproject.toml", "Pipfile"]

# Node.js
[nodejs]
symbol = " "
style = "fg:#b8bb26"
format = ' [$symbol($version)]($style)'
detect_extensions = ["js", "mjs", "cjs", "ts", "tsx"]
detect_files = ["package.json", ".node-version"]
detect_folders = ["node_modules"]

# Rust
[rust]
symbol = " "
style = "fg:#fe8019"
format = ' [$symbol($version)]($style)'
detect_extensions = ["rs"]
detect_files = ["Cargo.toml"]

# Go
[golang]
symbol = " "
style = "fg:#8ec07c"
format = ' [$symbol($version)]($style)'
detect_extensions = ["go"]
detect_files = ["go.mod", "go.sum"]

# Docker context
[docker_context]
symbol = " "
style = "fg:#458588"
format = ' [$symbol$context]($style)'
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]

# Package version (for libraries/packages)
[package]
symbol = "📦 "
style = "fg:#d3869b"
format = ' [$symbol$version]($style)'
display_private = false

# Fill (pushes things to the right)
[fill]
symbol = " "

# Command duration (only show if slow)
[cmd_duration]
min_time = 3_000  # Show after 3 seconds
style = "fg:#689d6a"
format = "[$duration]($style)"
show_milliseconds = false
show_notifications = false

# Time (right-aligned)
[time]
disabled = false
style = "fg:#689d6a"
format = "[$time]($style)"
time_format = "%H:%M"
use_12hr = false

# Jobs indicator
[jobs]
symbol = "⚙"
style = "bold fg:#fb4934"
format = "[$symbol$number]($style) "
number_threshold = 1

# Exit status (only show on error)
[status]
style = "bold fg:#fb4934"
symbol = "✖ "
success_symbol = ""
format = '[$symbol$common_meaning$signal_name$maybe_int]($style) '
map_symbol = true
disabled = false

# Memory usage (optional - uncomment to enable)
# [memory_usage]
# disabled = false
# threshold = 75
# symbol = " "
# style = "fg:#fb4934"
# format = '$symbol[$ram_pct]($style) '

# Battery (useful for laptops)
[battery]
full_symbol = ""
charging_symbol = "⚡"
discharging_symbol = "🔋"
unknown_symbol = "?"
empty_symbol = "✖"
format = "[$symbol$percentage]($style) "

[[battery.display]]
threshold = 20
style = "bold fg:#fb4934"

[[battery.display]]
threshold = 50
style = "fg:#fabd2f"

# Line break
[line_break]
disabled = false

# Shell indicator (optional - uncomment if you switch shells often)
# [shell]
# fish_indicator = "🐟"
# bash_indicator = "🐚"
# zsh_indicator = "Z"
# disabled = false
# style = "fg:#928374"
# format = ' [$indicator]($style)'
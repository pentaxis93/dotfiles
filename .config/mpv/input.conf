# MPV Custom Keybindings
# Default bindings still work - these are additions/modifications

# === Series Navigation ===
PGUP playlist-prev          # Previous episode
PGDWN playlist-next         # Next episode
Shift+ENTER playlist-next   # Next episode (alternative)

# === Quick Seeking ===
Shift+RIGHT seek  60        # Forward 1 minute
Shift+LEFT  seek -60        # Back 1 minute
Ctrl+RIGHT  seek  300       # Forward 5 minutes
Ctrl+LEFT   seek -300       # Back 5 minutes

# === Watch Later ===
Ctrl+s write-watch-later-config   # Manually save position
Ctrl+d delete-watch-later-config  # Delete saved position for current file

# === Playback Speed ===
] multiply speed 1.1        # Speed up 10%
[ multiply speed 0.9        # Slow down 10%
Backspace set speed 1.0     # Reset speed

# === Quick Actions ===
i script-binding stats/display-stats-toggle  # Toggle detailed stats
Shift+i script-binding stats/display-page-4  # Show all keybindings
# ============================================================================
# MPV CUSTOM KEYBINDINGS - OPTIMIZED FOR SERIES & MOVIE WATCHING
# ============================================================================
# Philosophy:
#   - Complement default bindings, don't replace them
#   - Use logical key combinations that are easy to remember
#   - Optimize for common watching scenarios (series binging, finding scenes)
#
# Note: Default MPV bindings still work! These are additions.
# To see all active bindings while playing: Shift+i → Page 4
#
# Default useful bindings reminder:
#   Space       - Pause/Play
#   q/Q         - Quit (saves position with our config)
#   f           - Toggle fullscreen
#   m           - Mute
#   9/0         - Volume down/up
#   ←/→         - Seek 5 seconds
#   ↑/↓         - Seek 60 seconds
#   ,/.         - Previous/Next frame (when paused)
#   s           - Screenshot
#   o/O         - Show progress/time
#
# Related Files:
#   ~/.config/mpv/mpv.conf - Main configuration
#   ~/.config/bspwm/polybar-autohide.sh - UI auto-hide in fullscreen
# ============================================================================

# ============================================================================
# SERIES NAVIGATION - For binge-watching TV shows
# ============================================================================
# These bindings make it effortless to navigate through episodes in a playlist.
# Usage: mpv Episode*.mkv (loads all as playlist)

PGUP playlist-prev          # Previous episode in playlist
                           # WHY: Page keys are logically "previous/next page" of content
                           # Muscle memory from PDF readers and browsers

PGDWN playlist-next         # Next episode in playlist
                           # WHY: Natural pairing with PGUP
                           # Easy to reach while relaxed/reclined

Shift+ENTER playlist-next   # Alternative next episode binding
                           # WHY: ENTER feels like "proceed" or "continue"
                           # Shift modifier prevents accidental presses

# ============================================================================
# QUICK SEEKING - Jump to specific parts quickly
# ============================================================================
# For when default 5/60 second seeks aren't granular enough.
# Useful for: skipping intros, finding specific scenes, recaps

Shift+RIGHT seek  60        # Jump forward 1 minute
                           # WHY: Shift = bigger jump than default arrow (5 sec)
                           # Perfect for skipping TV show intros (usually 60-90 sec)

Shift+LEFT  seek -60        # Jump back 1 minute
                           # WHY: Symmetric with Shift+RIGHT
                           # Useful for "wait, what did they say?"

Ctrl+RIGHT  seek  300       # Jump forward 5 minutes
                           # WHY: Ctrl = even bigger jump
                           # Skip recap segments or find next scene

Ctrl+LEFT   seek -300       # Jump back 5 minutes
                           # WHY: Symmetric with Ctrl+RIGHT
                           # "I missed the last few minutes"

# ============================================================================
# WATCH LATER MANAGEMENT - Manual control over resume points
# ============================================================================
# While position auto-saves on quit, these give you explicit control.

Ctrl+s write-watch-later-config   # Manually save current position
                                  # WHY: Ctrl+s = universal "save" shortcut
                                  # Use when: switching between multiple videos,
                                  # want to mark a specific spot to return to

Ctrl+d delete-watch-later-config  # Delete saved position for current file
                                  # WHY: Ctrl+d = often means "delete" in terminals
                                  # Use when: want to start fresh from beginning,
                                  # clear corrupted resume data

# ============================================================================
# PLAYBACK SPEED - For different content types
# ============================================================================
# Useful for: slow talkers, speed-watching tutorials, analyzing action scenes

] multiply speed 1.1        # Increase speed by 10%
                           # WHY: ] is visually "forward" or "more"
                           # 10% increments are noticeable but not jarring
                           # Good for: documentaries, tutorials

[ multiply speed 0.9        # Decrease speed by 10%
                           # WHY: [ is visually "backward" or "less"
                           # Good for: complex dialogue, foreign languages

Backspace set speed 1.0     # Reset to normal speed
                           # WHY: Backspace = "undo" or "reset"
                           # Quick way to return to normal after speed changes

# ============================================================================
# INFORMATION & DEBUGGING - See what's happening under the hood
# ============================================================================
# Useful for checking codecs, performance, or learning MPV keybindings.

i script-binding stats/display-stats-toggle  # Toggle detailed statistics overlay
                                            # WHY: 'i' for "information"
                                            # Shows: FPS, codec, bitrate, drops
                                            # Use when: debugging playback issues

Shift+i script-binding stats/display-page-4  # Display all active keybindings
                                            # WHY: Shift = "more info" than regular i
                                            # Shows: this file + all default bindings
                                            # Use when: learning MPV or forgot a key
# MPV Configuration with History and Resume Features

# === Watch Later / Resume Features ===
save-position-on-quit=yes       # Save playback position when quitting (Shift+Q or Q)
resume-playback=yes              # Resume from saved position (default: yes)
resume-playback-check-mtime=yes # Only resume if file hasn't changed since last play
watch-later-options=start        # Only save position, not all the other settings

# === Watch History ===
save-watch-history=yes           # Keep a log of all watched files
# History saved to: ~/.local/state/mpv/watch_history.jsonl

# === Quality of Life ===
keep-open=yes                    # Don't close when video ends (useful for series)
autofit=85%                      # Start at 85% of screen size
volume=70                        # Default volume
volume-max=150                   # Allow volume boost up to 150%

# === OSD (On-Screen Display) ===
osd-level=1                      # Show status messages and time
osd-duration=2000                # Show messages for 2 seconds
osd-font-size=32                 # Readable font size

# === Screenshots ===
screenshot-directory=~/Pictures/mpv-screenshots
screenshot-template="%F_%P"     # Filename_timestamp format

# === Subtitles ===
sub-auto=fuzzy                   # Load external subtitles with similar names
sub-file-paths=subs:subtitles   # Look for subtitles in these subdirectories

# === Cache ===
cache=yes                        # Enable cache for network streams
cache-secs=300                   # Cache 5 minutes of content
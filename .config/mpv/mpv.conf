# ============================================================================
# MPV CONFIGURATION - OPTIMIZED FOR SERIES WATCHING & CONVENIENCE
# ============================================================================
# This configuration emphasizes:
#   1. Resume playback - Never lose your place in a video
#   2. History tracking - Know what you've watched
#   3. Series watching - Optimized for binge-watching TV shows
#   4. Quality of life - Sensible defaults for daily use
#
# File Locations:
#   Watch later data: ~/.config/mpv/watch_later/
#   Watch history:    ~/.local/state/mpv/watch_history.jsonl
#   Screenshots:      ~/Pictures/mpv-screenshots/
#
# Related Files:
#   ~/.config/mpv/input.conf - Custom keybindings
#   ~/.config/bspwm/polybar-autohide.sh - Auto-hides UI in fullscreen
# ============================================================================

# ============================================================================
# WATCH LATER / RESUME FEATURES
# ============================================================================
# These settings ensure you never lose your place in a video, even after
# closing mpv or rebooting. Perfect for long movies or series.

save-position-on-quit=yes       # Automatically save position when you quit (q/Q)
                                # WHY: Never manually seek to where you left off again

resume-playback=yes              # Automatically resume from saved position
                                # WHY: Seamless continuation of interrupted viewing

resume-playback-check-mtime=yes # Only resume if file hasn't been modified
                                # WHY: Prevents resuming if file was edited/replaced

watch-later-options=start        # Only save playback position, not video settings
                                # WHY: Keeps resume data small and prevents unwanted
                                # settings (like filters) from persisting

# ============================================================================
# WATCH HISTORY
# ============================================================================
# Keep a detailed log of everything you've watched. Useful for tracking
# series progress or finding that video you watched last week.

save-watch-history=yes           # Enable watch history logging
                                # WHY: Track viewing habits, find recently watched files
                                # Location: ~/.local/state/mpv/watch_history.jsonl
                                # Format: JSON Lines, one entry per line
                                # Can be parsed with: jq '.' < watch_history.jsonl

# ============================================================================
# QUALITY OF LIFE
# ============================================================================
# Sensible defaults that make mpv more pleasant to use daily.

keep-open=yes                    # Don't close player when video ends
                                # WHY: Allows replaying, seeking back, or playing next
                                # file without reopening mpv. Essential for playlists.

autofit=85%                      # Start window at 85% of screen size
                                # WHY: Large enough to see detail, small enough to not
                                # cover everything. Prevents tiny windows for small videos.

volume=70                        # Default volume level (0-100)
                                # WHY: Safe starting volume that won't blast your ears

volume-max=150                   # Maximum volume percentage
                                # WHY: Allows boosting quiet videos beyond 100%
                                # Useful for poorly normalized content

# ============================================================================
# ON-SCREEN DISPLAY (OSD)
# ============================================================================
# Configure what information appears on screen during playback.

osd-level=1                      # Show brief status and time on seek
                                # WHY: See where you are without cluttering the screen
                                # Levels: 0=off, 1=seek/status, 2=+time, 3=+total time

osd-duration=2000                # Show OSD messages for 2 seconds (milliseconds)
                                # WHY: Long enough to read, short enough to not annoy

osd-font-size=32                 # OSD font size in pixels
                                # WHY: Large enough to read from couch distance

# ============================================================================
# SCREENSHOTS
# ============================================================================
# Configure where and how screenshots are saved.

screenshot-directory=~/Pictures/mpv-screenshots
                                # WHY: Organized location, not cluttering home directory
                                # Directory created automatically if it doesn't exist

screenshot-template="%F_%P"     # Template: VideoFileName_Timestamp
                                # WHY: Groups screenshots by video, sortable by time
                                # Example: MovieName_00-15-42.jpg
                                # Tokens: %F=filename, %P=playback time

# ============================================================================
# SUBTITLES
# ============================================================================
# Smart subtitle detection and loading.

sub-auto=fuzzy                   # Load external subtitles with similar filenames
                                # WHY: Finds subtitles even if names don't match exactly
                                # e.g., "Movie.mp4" will find "Movie.English.srt"

sub-file-paths=subs:subtitles   # Subdirectories to search for subtitle files
                                # WHY: Keeps media directories clean by organizing
                                # subtitles in subdirectories

# ============================================================================
# CACHE / BUFFERING
# ============================================================================
# Optimize playback for both local and network content.

cache=yes                        # Enable cache for smoother playback
                                # WHY: Prevents stuttering on slow drives or network

cache-secs=300                   # Cache up to 5 minutes of content
                                # WHY: Enough buffer for network hiccups, not excessive
                                # RAM usage. 1080p ≈ 200MB for 5 minutes
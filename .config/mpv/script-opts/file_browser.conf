# ============================================================================
# MPV FILE BROWSER - GRUVBOX THEME CONFIGURATION
# ============================================================================
# Customizes the file browser appearance to match the Gruvbox color scheme
# used throughout the system (BSPWM, Polybar, Alacritty, etc.)
#
# Color Reference:
#   Background:     #1d2021 (dark)
#   Foreground:     #ebdbb2 (cream)
#   Primary Accent: #8ec07c (bright aqua)
#   Secondary:      #689d6a (regular aqua)
#   Warning:        #fabd2f (yellow)
#   Success:        #b8bb26 (green)
# ============================================================================

# ============================================================================
# DISPLAY SETTINGS
# ============================================================================
# Number of entries shown at once - optimized for 1080p displays
num_entries=25

# Wrap cursor around top/bottom of list for easier navigation
wrap=true

# Start in Videos folder by default, with home and root as fallbacks
root=~/Videos,~/,/
default_to_working_directory=false

# Follow currently playing item when file changes
cursor_follows_playing_item=true

# Replace home directory with ~ in header for cleaner display
home_label=true

# ============================================================================
# GRUVBOX COLOR SCHEME
# ============================================================================
# All colors use hex values without '#' prefix as required by mpv

# Header - bright aqua (#8ec07c) for contrast and visibility
font_colour_header=7cc08e

# Body text - cream (#ebdbb2) for readability on dark background
font_colour_body=b2dbeb

# Wrapper indicators (...) - bright aqua to match header
font_colour_wrappers=7cc08e

# Cursor - bright aqua (#8ec07c) to highlight current selection
font_colour_cursor=7cc08e

# Escape characters and special symbols - muted gray (#928374)
font_colour_escape_chars=748392

# Multi-select mode - orange (#fe8019) for clear distinction
font_colour_multiselect=1980fe

# Selected items - yellow (#fabd2f) for visibility
font_colour_selected=2fbdfa

# Currently playing file - green (#b8bb26) for status indication
font_colour_playing=26bbb8

# Playing file when multi-selected - bright aqua for distinction
font_colour_playing_multiselected=7cc08e

# ============================================================================
# TYPOGRAPHY
# ============================================================================
# Use monospace for consistent alignment
font_name_header=Monospace
font_name_body=Monospace
font_name_folder=Monospace
font_name_cursor=Monospace
font_name_wrappers=Monospace

# Slightly larger header for hierarchy
scaling_factor_header=1.2

# Bold header for emphasis
font_bold_header=true

# Text-based icons with Gruvbox colors embedded
# Using ASS tags: \c&H sets color in BGR format
# 8ec07c (RGB) = 7cc08e (BGR) - bright aqua for folders
folder_icon={\c&H7cc08e&}[DIR]{\r}\h
cursor_icon=▶\h

# ============================================================================
# INTERFACE BEHAVIOR
# ============================================================================
# Enable custom keybinds for vim navigation
custom_keybinds=true

# Save last opened directory for convenience
save_last_opened_directory=true
default_to_last_opened_directory=true

# Show compatible files only by default
filter_files=true

# Hide dot files/directories for cleaner display
filter_dot_files=yes
filter_dot_dirs=yes

# ============================================================================
# PERFORMANCE
# ============================================================================
# Enable concurrent directory parsing for responsiveness
ls_parser=true

# Moderate history size for good performance
history_size=50

# Enable directory cache for faster browsing
cache=true
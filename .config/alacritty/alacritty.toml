# Alacritty Configuration
# https://alacritty.org/config-alacritty.html

[window]
padding = { x = 10, y = 10 }
decorations = "Full"
opacity = 0.95
startup_mode = "Windowed"
dynamic_title = true

[scrolling]
history = 10000
multiplier = 3

[font]
normal = { family = "MesloLGS Nerd Font", style = "Regular" }
bold = { family = "MesloLGS Nerd Font", style = "Bold" }
italic = { family = "MesloLGS Nerd Font", style = "Italic" }
bold_italic = { family = "MesloLGS Nerd Font", style = "Bold Italic" }
size = 11.0

[cursor]
style = { shape = "Block", blinking = "Off" }
vi_mode_style = { shape = "Block", blinking = "Off" }
blink_interval = 750
unfocused_hollow = true

[selection]
save_to_clipboard = true

[mouse]
hide_when_typing = true

# Gruvbox Dark Hard color scheme
# Matches your Helix gruvbox_dark_hard theme
[colors.primary]
background = '#1d2021'  # Hard contrast dark background
foreground = '#ebdbb2'  # Light foreground
bright_foreground = '#fbf1c7'

[colors.cursor]
text = '#1d2021'
cursor = '#ebdbb2'

[colors.vi_mode_cursor]
text = '#1d2021'
cursor = '#ebdbb2'

[colors.selection]
text = 'CellForeground'
background = '#3c3836'

[colors.normal]
black   = '#282828'
red     = '#cc241d'
green   = '#98971a'
yellow  = '#d79921'
blue    = '#458588'
magenta = '#b16286'

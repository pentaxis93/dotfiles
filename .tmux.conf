# Tmux Configuration - Kitty-like with Alt keybindings
# ======================================================

# Set fish as default shell
set-option -g default-shell /bin/fish

# Change prefix from Ctrl-b to Ctrl-a (for advanced commands only)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ==========================================
# MOUSE SUPPORT & TEXT SELECTION FIX
# ==========================================
# Enable mouse support with improved text selection
# - Click and drag to select text (auto-copies to clipboard)
# - Hold Shift to bypass tmux for pure terminal selection
# - Double-click to select word, triple-click for line
# - Click panes/windows to switch, scroll to navigate history
set -g mouse on

# Start windows and panes at 1, not 0 (more intuitive)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Set scrollback buffer to 10000 lines
set -g history-limit 10000

# Enable vi mode for copy/paste
setw -g mode-keys vi

# ==========================================
# CLIPBOARD INTEGRATION (fixes selection issues)
# ==========================================
# Use system clipboard for tmux copy operations
# Requires: xclip (already installed)

# Set clipboard for copy mode
set -g set-clipboard on

# Copy to system clipboard using xclip
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -i -sel clip > /dev/null"
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -i -sel clip > /dev/null"

# Faster command sequences (no delay after ESC)
set -s escape-time 0

# Better colors and terminal support (true color/24-bit RGB)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:Tc"
set -ag terminal-overrides ",xterm-256color:Tc"
set -ga terminal-features ",alacritty:RGB"

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off

# Focus events (for vim/nvim)
set -g focus-events on

# ==========================================
# TAB-ONLY MODE: TMUX FOR TABS, BSPWM FOR TILING
# ==========================================
# Philosophy:
#   - BSPWM handles window tiling (Super key)
#   - Tmux handles terminal tabs only (Alt key)
#   - No pane functionality to avoid confusion
#   - Tri-modal navigation: vim keys, arrows, numpad
#
# This separation prevents the "nested panes problem" where you
# have tmux panes inside BSPWM tiles, creating navigation confusion.
# ==========================================

# IMPORTANT: Unbind default Alt+arrow bindings to preserve Fish shell word navigation
# We use Alt+Shift instead to avoid conflicts with command-line editing
unbind -n M-Left
unbind -n M-Right

# Tab (Window) Management - No prefix needed!
# --------------------------------------------

# Alt+T: New tab (window)
bind -n M-t new-window -c "#{pane_current_path}"

# Alt+W: Close current tab (window)
bind -n M-w confirm-before -p "Close tab #W? (y/n)" kill-window

# Alt+Q: Close entire tmux session (like closing kitty window)
bind -n M-q confirm-before -p "Close tmux session? (y/n)" kill-session

# Alt+1-9: Switch directly to tabs 1-9
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# TRI-MODAL TAB NAVIGATION (Alt+Shift to avoid conflicts)
# Using Alt+Shift prevents conflicts with Fish shell (Alt+l lists completions)

# Arrow keys: Navigate tabs
bind -n M-S-Left previous-window
bind -n M-S-Right next-window

# Vim keys: Navigate tabs (h/l for left/right)
# NOTE: Terminals send Alt+UPPERCASE when Alt+Shift+letter is pressed
bind -n M-H previous-window          # Alt+Shift+h → Terminal sends Alt+H
bind -n M-L next-window              # Alt+Shift+l → Terminal sends Alt+L

# Alternative vim keys (j/k for consistency with other apps)
bind -n M-J previous-window          # Alt+Shift+j → Alternative vim style
bind -n M-K next-window              # Alt+Shift+k → Alternative vim style

# Numpad keys: Navigate tabs (4/6 for left/right)
# NOTE: Tmux doesn't support direct numpad key bindings with modifiers
# Users can use Alt+Shift+arrows or Alt+Shift+h/l instead

# Alt+[/]: Move tab position left/right
bind -n M-[ swap-window -t -1\; select-window -t -1
bind -n M-] swap-window -t +1\; select-window -t +1

# Alt+R: Rename current tab
bind -n M-r command-prompt -I "#W" "rename-window '%%'"

# Alt+N: New tab after current (alternative to Alt+T)
bind -n M-n new-window -a -c "#{pane_current_path}"

# PANE FUNCTIONALITY DISABLED
# ---------------------------
# All pane operations have been intentionally removed.
# Use BSPWM (Super+Enter, Super+hjkl) for window tiling instead.
# This prevents confusion between tmux panes and BSPWM tiles.

# ==========================================
# COPY MODE (Vim-style)
# ==========================================

# Alt+[: Enter copy mode (like scrollback in kitty)
bind -n M-'[' copy-mode

# ==========================================
# MOUSE SELECTION BINDINGS (Synchronized with Alacritty)
# ==========================================
# Unified behavior with native Alacritty:
# - Selections remain visible after copying (using -no-clear)
# - Auto-copy to clipboard on selection
# - Right-click and middle-click paste
# - Shift+select bypasses tmux for terminal selection

# In copy mode:
# - v: start selection
# - y: copy selection to clipboard
# - q: quit copy mode
bind -T copy-mode-vi v send -X begin-selection

# Mouse drag: select and copy but KEEP selection visible
# Using copy-pipe-no-clear to match Alacritty's behavior
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "xclip -i -sel clip > /dev/null"

# Double click: select word and copy (keep visible)
bind -T copy-mode-vi DoubleClick1Pane send -X select-word \; send -X copy-pipe-no-clear "xclip -i -sel clip > /dev/null"
bind -n DoubleClick1Pane copy-mode -M \; send -X select-word \; send -X copy-pipe-no-clear "xclip -i -sel clip > /dev/null"

# Triple click: select line and copy (keep visible)
bind -T copy-mode-vi TripleClick1Pane send -X select-line \; send -X copy-pipe-no-clear "xclip -i -sel clip > /dev/null"
bind -n TripleClick1Pane copy-mode -M \; send -X select-line \; send -X copy-pipe-no-clear "xclip -i -sel clip > /dev/null"

# Middle-click to paste (Linux standard - MouseButton2)
bind -n MouseDown2Pane run "tmux set-buffer \"$(xclip -o -sel clip)\"; tmux paste-buffer"

# Right-click to paste from clipboard (MouseButton3)
bind -n MouseDown3Pane run "tmux set-buffer \"$(xclip -o -sel clip)\"; tmux paste-buffer"

# Alt+V: Paste from system clipboard
bind -n M-v run "tmux set-buffer \"$(xclip -o -sel clip)\"; tmux paste-buffer"

# ==========================================
# SESSION MANAGEMENT (with prefix)
# ==========================================

# Ctrl+a d: Detach from session
bind d detach-client

# Ctrl+a s: Choose session
bind s choose-session

# Ctrl+a $: Rename session
bind '$' command-prompt -I "#S" "rename-session '%%'"

# Ctrl+a (: Switch to previous session
bind '(' switch-client -p

# Ctrl+a ): Switch to next session
bind ')' switch-client -n

# ==========================================
# STATUS BAR (Kitty-like tab bar)
# ==========================================

# Status bar at top (like kitty)
set -g status-position top

# Update every second
set -g status-interval 1

# Base status bar styling - Gruvbox Dark Hard
set -g status-style 'bg=#1d2021,fg=#ebdbb2'

# Left side: Session name
set -g status-left '#[bg=#8ec07c,fg=#1d2021,bold] #S #[bg=#1d2021] '
set -g status-left-length 30

# Window (tab) styling - make them look like kitty tabs
setw -g window-status-format '#[bg=#3c3836,fg=#a89984] #I: #W '
setw -g window-status-current-format '#[bg=#8ec07c,fg=#1d2021,bold] #I: #W '
setw -g window-status-separator ''

# Activity indicator
setw -g window-status-activity-style 'bg=#fb4934,fg=#1d2021'

# Right side: Simple time display
set -g status-right '#[bg=#3c3836,fg=#689d6a] %H:%M '
set -g status-right-length 20

# Pane borders
set -g pane-border-style 'fg=#3c3836'
set -g pane-active-border-style 'fg=#8ec07c'

# Command/message styling
set -g message-style 'bg=#8ec07c,fg=#1d2021,bold'

# ==========================================
# CONVENIENCE SHORTCUTS (with prefix)
# ==========================================

# Ctrl+a r: Reload configuration
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Ctrl+a ?: Show all keybindings
bind ? list-keys

# Ctrl+a i: Display pane info
bind i display-panes

# ==========================================
# QUICK REFERENCE (TAB-ONLY MODE)
# ==========================================
#
# TABS (Windows):
#   Alt+T        - New tab
#   Alt+W        - Close tab
#   Alt+1-9      - Switch to tab 1-9 (direct access)
#   Alt+R        - Rename tab
#   Alt+[/]      - Move tab left/right in order
#
# TAB NAVIGATION (Bi-modal with Alt+Shift):
#   Alt+Shift+Left/Right    - Previous/next tab (arrows)
#   Alt+Shift+h/l          - Previous/next tab (vim style)
#   Alt+Shift+j/k          - Previous/next tab (alt vim style)
#   NOTE: Plain Alt+arrows reserved for Fish shell word navigation
#   NOTE: Numpad not supported in tmux keybindings
#
# COPY/PASTE:
#   Alt+[        - Enter copy mode
#   v           - Start selection (in copy mode)
#   y           - Copy selection
#   Alt+V        - Paste
#
# SESSION (with Ctrl+a prefix):
#   Ctrl+a d     - Detach
#   Ctrl+a s     - Choose session
#   Ctrl+a r     - Reload config
#
# MISC:
#   Alt+Q        - Quit tmux session
#
# PANES DISABLED:
#   Use BSPWM for window tiling (Super+Enter, Super+hjkl)
#
# MOUSE SELECTION (Synchronized with Alacritty):
#   Click+Drag   - Select text (stays visible) + auto-copy to clipboard
#   Double-click - Select word (stays visible) + auto-copy
#   Triple-click - Select line (stays visible) + auto-copy
#   Middle-click - Paste from clipboard (Linux standard)
#   Right-click  - Paste from clipboard
#   Shift+Select - Bypass tmux (use pure terminal selection)
#
# TROUBLESHOOTING TEXT SELECTION:
#   If selection doesn't work as expected:
#   1. Hold Shift while selecting for pure terminal selection
#   2. Reload tmux config: Ctrl+a r
#   3. Ensure xclip is installed: which xclip
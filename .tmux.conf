# Tmux Configuration - Kitty-like with Alt keybindings
# ======================================================

# Set fish as default shell
set-option -g default-shell /bin/fish

# Change prefix from Ctrl-b to Ctrl-a (for advanced commands only)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Enable mouse support (click windows/panes, scroll, resize)
set -g mouse on

# Start windows and panes at 1, not 0 (more intuitive)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Set scrollback buffer to 10000 lines
set -g history-limit 10000

# Enable vi mode for copy/paste
setw -g mode-keys vi

# Faster command sequences (no delay after ESC)
set -s escape-time 0

# Better colors and terminal support (true color/24-bit RGB)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:Tc"
set -ag terminal-overrides ",xterm-256color:Tc"
set -ga terminal-features ",alacritty:RGB"

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off

# Focus events (for vim/nvim)
set -g focus-events on

# ==========================================
# KITTY-LIKE KEYBINDINGS (Alt-based)
# ==========================================

# Tab (Window) Management - No prefix needed!
# --------------------------------------------

# Alt+T: New tab (window)
bind -n M-t new-window -c "#{pane_current_path}"

# Alt+W: Close current tab (window)
bind -n M-w confirm-before -p "Close tab #W? (y/n)" kill-window

# Alt+Q: Close entire tmux session (like closing kitty window)
bind -n M-q confirm-before -p "Close tmux session? (y/n)" kill-session

# Alt+1-9: Switch directly to tabs 1-9
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Alt+Left/Right: Navigate tabs
bind -n M-Left previous-window
bind -n M-Right next-window

# Alt+[/]: Move tab position left/right
bind -n M-[ swap-window -t -1\; select-window -t -1
bind -n M-] swap-window -t +1\; select-window -t +1

# Alt+R: Rename current tab
bind -n M-r command-prompt -I "#W" "rename-window '%%'"

# Alt+N: New tab after current (alternative to Alt+T)
bind -n M-n new-window -a -c "#{pane_current_path}"

# Pane Management - No prefix needed!
# ------------------------------------

# Alt+Enter: Split horizontal (new pane below)
bind -n M-Enter split-window -v -c "#{pane_current_path}"

# Alt+|: Split vertical (new pane to the right)
bind -n M-\\ split-window -h -c "#{pane_current_path}"

# Alt+-: Split horizontal (alternative)
bind -n M-- split-window -v -c "#{pane_current_path}"

# Alt+Arrow keys: Navigate between panes
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D
bind -n M-h select-pane -L
bind -n M-l select-pane -R

# Alt+F: Toggle pane fullscreen (zoom)
bind -n M-f resize-pane -Z

# Alt+X: Close current pane
bind -n M-x confirm-before -p "Close pane? (y/n)" kill-pane

# Alt+Space: Cycle through pane layouts
bind -n M-Space next-layout

# Resize panes with Alt+Shift+arrows
bind -n M-S-Up resize-pane -U 2
bind -n M-S-Down resize-pane -D 2
bind -n M-S-Left resize-pane -L 5
bind -n M-S-Right resize-pane -R 5

# ==========================================
# COPY MODE (Vim-style)
# ==========================================

# Alt+[: Enter copy mode (like scrollback in kitty)
bind -n M-'[' copy-mode

# In copy mode:
# - v: start selection
# - y: copy selection
# - q: quit copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel

# Alt+V: Paste
bind -n M-v paste-buffer

# ==========================================
# SESSION MANAGEMENT (with prefix)
# ==========================================

# Ctrl+a d: Detach from session
bind d detach-client

# Ctrl+a s: Choose session
bind s choose-session

# Ctrl+a $: Rename session
bind '$' command-prompt -I "#S" "rename-session '%%'"

# Ctrl+a (: Switch to previous session
bind '(' switch-client -p

# Ctrl+a ): Switch to next session
bind ')' switch-client -n

# ==========================================
# STATUS BAR (Kitty-like tab bar)
# ==========================================

# Status bar at top (like kitty)
set -g status-position top

# Update every second
set -g status-interval 1

# Base status bar styling
set -g status-style 'bg=#1e1e2e,fg=#cdd6f4'

# Left side: Session name
set -g status-left '#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e] '
set -g status-left-length 30

# Window (tab) styling - make them look like kitty tabs
setw -g window-status-format '#[bg=#313244,fg=#9399b2] #I: #W '
setw -g window-status-current-format '#[bg=#89b4fa,fg=#1e1e2e,bold] #I: #W '
setw -g window-status-separator ''

# Activity indicator
setw -g window-status-activity-style 'bg=#f38ba8,fg=#1e1e2e'

# Right side: Simple time display
set -g status-right '#[bg=#313244,fg=#cdd6f4] %H:%M '
set -g status-right-length 20

# Pane borders
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#89b4fa'

# Command/message styling
set -g message-style 'bg=#89b4fa,fg=#1e1e2e,bold'

# ==========================================
# CONVENIENCE SHORTCUTS (with prefix)
# ==========================================

# Ctrl+a r: Reload configuration
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Ctrl+a ?: Show all keybindings
bind ? list-keys

# Ctrl+a i: Display pane info
bind i display-panes

# ==========================================
# QUICK REFERENCE
# ==========================================
#
# TABS (Windows):
#   Alt+T        - New tab
#   Alt+W        - Close tab
#   Alt+1-9      - Switch to tab 1-9
#   Alt+Left/Right - Previous/next tab
#   Alt+[/]      - Move tab left/right
#   Alt+R        - Rename tab
#
# PANES:
#   Alt+Enter    - Split horizontal
#   Alt+|        - Split vertical
#   Alt+Arrows   - Navigate panes
#   Alt+F        - Toggle fullscreen
#   Alt+X        - Close pane
#   Alt+Space    - Cycle layouts
#
# COPY/PASTE:
#   Alt+[        - Enter copy mode
#   v           - Start selection (in copy mode)
#   y           - Copy selection
#   Alt+V        - Paste
#
# SESSION (with Ctrl+a prefix):
#   Ctrl+a d     - Detach
#   Ctrl+a s     - Choose session
#   Ctrl+a r     - Reload config
#
# MISC:
#   Alt+Q        - Quit tmux session
#   Mouse       - Click tabs, select text, resize
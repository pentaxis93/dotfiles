# yubikey-touch-detector — service configuration
#
# Read by the shipped systemd user unit via EnvironmentFile. Surfaces the
# YubiKey's silent touch request as a desktop notification.
#
# Why this exists: the ssh-agent signs FIDO2 (ed25519-sk) challenges with no
# controlling terminal, so the "Confirm user presence" prompt never prints —
# the key blinks unannounced. This restores the cue (and covers git, sudo too).

# Emit a libnotify desktop notification while the key awaits a touch.
# Any truthy value enables it.
YUBIKEY_TOUCH_DETECTOR_LIBNOTIFY=true

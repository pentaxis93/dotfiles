# Portal backend routing for the Niri session.
#
# Overrides the system file (/usr/share/xdg-desktop-portal/niri-portals.conf,
# shipped by the niri package), whose `default=gnome;gtk;` sends the FileChooser
# — and every other unlisted interface — to xdg-desktop-portal-gnome first.
#
# On Niri there is no GNOME session, and as of xdg-desktop-portal-gnome 50.0 that
# backend crashes (SIGABRT) on startup. The portal commits to it and never falls
# through to gtk, so file-upload dialogs, "Open with…" choosers, and theme /
# dark-mode detection silently never appear. (This surfaced after the 2026-05-21
# update bumped the gnome portal against glib2 2.88 / gtk4 4.22.)
#
# gtk is the canonical, session-agnostic backend and is already running. We make
# it the default; gnome stays as the fallback for the interfaces only it
# implements (ScreenCast, Screenshot, RemoteDesktop, …) for if/when it recovers.
# Secret remains with gnome-keyring, matching the upstream file.
#
# A higher-precedence user config fully replaces the system file (configs are not
# merged), so this file is self-contained.
[preferred]
default=gtk;gnome;
org.freedesktop.impl.portal.Secret=gnome-keyring;
